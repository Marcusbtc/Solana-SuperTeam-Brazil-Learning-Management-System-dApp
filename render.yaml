services:
  - type: web
    name: superteam-academy-backend
    env: node
    rootDir: onchain-academy/backend
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run prisma:deploy && npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: HELIUS_RPC_URL
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: CREDENTIAL_COLLECTIONS
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: XP_MINT
        sync: false
      - key: INTERNAL_JOB_TOKEN
        sync: false
      - key: SANITY_PROJECT_ID
        sync: false
      - key: SANITY_DATASET
        value: production
      - key: SANITY_API_VERSION
        value: "2025-01-01"
      - key: SANITY_TOKEN
        sync: false
      - key: SANITY_USE_CDN
        value: "false"

  - type: static
    name: superteam-academy-sanity-studio
    rootDir: onchain-academy/cms/sanity
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SANITY_STUDIO_PROJECT_ID
        sync: false
      - key: SANITY_STUDIO_DATASET
        value: production

  - type: cron
    name: superteam-leaderboard-rebuild
    env: node
    schedule: "*/30 * * * *"
    rootDir: onchain-academy/backend
    buildCommand: npm ci && npm run build
    startCommand: >-
      node -e "fetch(process.env.BACKEND_URL + '/v1/internal/jobs/leaderboard/rebuild',
      {method:'POST',headers:{'x-internal-token':process.env.INTERNAL_JOB_TOKEN}})
      .then(r=>r.text()).then(t=>{console.log(t);process.exit(0);})
      .catch(e=>{console.error(e);process.exit(1);})"
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: INTERNAL_JOB_TOKEN
        sync: false
